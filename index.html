<!DOCTYPE html>
<html>
<head>
<title>Y Math Bank</title>

<style>
body{
  background:black;
  color:white;
  font-family:Arial;
  text-align:center;
}

h1{
  margin-top:20px;
}

#search{
  padding:10px;
  width:250px;
  border-radius:8px;
  border:none;
  margin:20px;
}

.game-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,150px);
  gap:20px;
  justify-content:center;
  padding:20px;
}

.game-card{
  background:#1a1a1a;
  border-radius:10px;
  padding:10px;
  text-decoration:none;
  color:white;
  transition:0.2s;
}

.game-card:hover{
  background:#333;
  transform:scale(1.05);
}

.game-card img{
  width:100%;
  border-radius:6px;
}
</style>

<script>
function searchGames(){
  let input=document.getElementById("search").value.toLowerCase();
  let games=document.querySelectorAll(".game-card");

  games.forEach(game=>{
    if(game.innerText.toLowerCase().includes(input)){
      game.style.display="block";
    }else{
      game.style.display="none";
    }
  });
}
</script>

</head>

<body>

<h1>🎮 Y Math Bank Games</h1>
<p>Game Library</p>

<input type="text" id="search" onkeyup="searchGames()" placeholder="Search games...">

<div class="game-grid">

<a href="https://aenguspatterson.com/pages/games/slope/index.html" class="game-card">
<p>Slope</p>
</a>

<a href="https://krosign.github.io:Ethyrnal-s-Arcade/activities2/clcrazymotorcycle.html" class="game-card">
<p>Crazy Motorcycle</p>
</a>

<a href="https://krosign.github.io/ethyrnal-s-Arcade/activities/clgranny.html" class="game-card">
<p> Granny </p>

</a>

</div>

</body>
</html>
<a href="https://amhooman.github.io/website/games/retrobowl/" class="game-card">
<p>Retro Bowl</p>
  
</a>
<a href="https://krosign.github.io/Ethyrnal-s-Arcade/activities/clgeometry%20Dash%20Lite.html" class="game-card">
<p>Geometry Dash Lite</p>
</a>
